[tools]
go = "1.25.12"
bun = "1.3"
# dependency-cruiser supports ^22||^24||>=26 (system Node 25 is outside that range)
node = "24.12.0"
golangci-lint = "2.12.2"
gofumpt = "0.10.0"
gitleaks = "8.30.1"
"github:fe3dback/go-arch-lint" = "v1.16.0"
"github:szhekpisov/gomutants" = "v0.4.0"
"github:mach6/go-covercheck" = "v0.6.1"
"go:golang.org/x/vuln/cmd/govulncheck" = "v1.6.0"

[tasks.backend]
description = "Run the Go control plane"
dir = "farplane-backend"
run = "go run ./cmd/farplane"

[tasks.web]
description = "Run the TanStack Router SPA (Rsbuild)"
dir = "farplane-web"
run = "bun run dev"

[tasks.install-web]
description = "Install web package dependencies"
dir = "farplane-web"
run = "bun install"

[tasks.db-up]
description = "Create local Postgres databases"
run = "make db-create"

[tasks.migrate-up]
description = "Apply database migrations"
run = "make migrate-up"

[tasks.test]
description = "Run backend tests"
run = "make test-backend"
